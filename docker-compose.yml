services:
  seedance:
    build:
      context: .
      dockerfile: Dockerfile
    image: seedanceforme:custom
    container_name: seedance-web
    ports:
      - "3001:3001"
      - "6080:6080"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    shm_size: '512mb'
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./data:/app/server/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
