<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 440px;
      min-height: 180px;
      max-height: 600px;
      overflow-y: auto;
      background: #0f111a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #1c1f2e;
      border-bottom: 1px solid #2a2d3e;
    }
    .header-icon { font-size: 20px; }
    .header-title { font-weight: 700; font-size: 15px; color: #fff; }
    .header-version { font-size: 11px; color: #666; margin-left: auto; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1d2e;
    }
    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-label .badge {
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
    }
    .badge-intl { background: #3b82f620; color: #60a5fa; border: 1px solid #3b82f640; }
    .badge-domestic { background: #a855f720; color: #c084fc; border: 1px solid #a855f740; }
    .badge-region { background: #10b98120; color: #34d399; border: 1px solid #10b98140; margin-left: 4px; }

    .info-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
      font-size: 12px;
    }
    .info-label { color: #6b7280; white-space: nowrap; }
    .info-value { color: #d1d5db; word-break: break-all; font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; }
    .info-value .domain-item { display: inline; }
    .info-value .domain-item + .domain-item::before { content: '、'; color: #4b5563; }

    .cookie-stats {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .stat-chip {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: #1c1f2e;
      border: 1px solid #2a2d3e;
      color: #9ca3af;
    }
    .stat-chip strong { color: #e5e7eb; }

    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .input-field {
      width: 100%;
      padding: 6px 10px;
      background: #1c1f2e;
      border: 1px solid #2a2d3e;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: #8b5cf6; }
    .input-field::placeholder { color: #4b5563; }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: linear-gradient(135deg, #7c3aed, #4f46e5); }
    .btn-secondary {
      background: #374151;
      color: #d1d5db;
    }
    .btn-secondary:hover:not(:disabled) { background: #4b5563; }
    .btn-success {
      background: #059669;
      color: #fff;
    }
    .btn-success:hover:not(:disabled) { background: #047857; }
    .btn-full { flex: 1; justify-content: center; }

    .result-msg {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.6;
    }
    .result-success { background: #10b98115; border: 1px solid #10b98130; color: #34d399; }
    .result-error { background: #ef444415; border: 1px solid #ef444430; color: #f87171; }

    .no-cookies {
      text-align: center;
      padding: 20px 16px;
      color: #6b7280;
    }
    .no-cookies .icon { font-size: 32px; margin-bottom: 8px; }
    .no-cookies .title { font-size: 14px; font-weight: 600; color: #9ca3af; margin-bottom: 4px; }
    .no-cookies .hint { font-size: 12px; color: #4b5563; }

    .settings-toggle {
      padding: 8px 16px;
    }
    .settings-toggle-btn {
      background: none;
      border: none;
      color: #6b7280;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .settings-toggle-btn:hover { color: #9ca3af; }
    .settings-toggle-btn .arrow { transition: transform 0.2s; display: inline-block; }
    .settings-toggle-btn .arrow.open { transform: rotate(90deg); }

    .settings-panel {
      padding: 12px 16px;
      background: #161824;
      border-top: 1px solid #1a1d2e;
    }
    .setting-item {
      margin-bottom: 8px;
    }
    .setting-item label {
      display: block;
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 3px;
    }
    .setting-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .divider { border: none; border-top: 1px solid #1a1d2e; margin: 0; }

    .loading {
      text-align: center;
      padding: 24px;
      color: #6b7280;
    }
    .loading .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #2a2d3e;
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <span class="header-icon">🍪</span>
    <span class="header-title">Seedance Cookie Importer</span>
    <span class="header-version">v1.0.0</span>
  </div>

  <!-- Loading -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>正在检测 Cookie...</div>
  </div>

  <!-- No cookies -->
  <div id="no-cookies" class="no-cookies hidden">
    <div class="icon">🔒</div>
    <div class="title">未检测到 Dreamina 会话</div>
    <div class="hint">请先登录 <a href="https://dreamina.capcut.com" target="_blank" style="color:#8b5cf6">dreamina.capcut.com</a>，然后点击此插件</div>
  </div>

  <!-- International (Dreamina) section -->
  <div id="intl-section" class="section hidden">
    <div class="section-label">
      🌐 国际版 (Dreamina)
      <span class="badge badge-intl">International</span>
      <span id="intl-region" class="badge badge-region hidden"></span>
    </div>
    <div class="info-grid">
      <span class="info-label">SessionID</span>
      <span class="info-value" id="intl-session-id">-</span>
      <span class="info-label">Cookies</span>
      <span class="info-value" id="intl-cookie-count">-</span>
      <span class="info-label">域名分布</span>
      <span class="info-value" id="intl-domains">-</span>
    </div>
    <div class="action-row" style="margin-top:10px">
      <input type="text" id="intl-name" class="input-field" placeholder="账号名称（可选，默认自动生成）" />
    </div>
    <div class="action-row">
      <button id="btn-copy-intl" class="btn btn-secondary btn-full">📋 复制 JSON</button>
      <button id="btn-import-intl" class="btn btn-primary btn-full">🚀 一键导入</button>
    </div>
    <div id="intl-result" class="result-msg hidden"></div>
  </div>

  <!-- Domestic (Jimeng) section -->
  <div id="domestic-section" class="section hidden">
    <div class="section-label">
      🇨🇳 国内版 (即梦)
      <span class="badge badge-domestic">Domestic</span>
    </div>
    <div class="info-grid">
      <span class="info-label">SessionID</span>
      <span class="info-value" id="domestic-session-id">-</span>
    </div>
    <div class="action-row" style="margin-top:10px">
      <input type="text" id="domestic-name" class="input-field" placeholder="账号名称（可选）" />
    </div>
    <div class="action-row">
      <button id="btn-copy-domestic" class="btn btn-secondary btn-full">📋 复制</button>
      <button id="btn-import-domestic" class="btn btn-primary btn-full">🚀 一键导入</button>
    </div>
    <div id="domestic-result" class="result-msg hidden"></div>
  </div>

  <!-- Settings toggle -->
  <div class="settings-toggle">
    <button id="btn-toggle-settings" class="settings-toggle-btn">
      <span class="arrow" id="settings-arrow">▶</span> ⚙️ 平台设置
    </button>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel" class="settings-panel hidden">
    <div style="padding:6px 10px;margin-bottom:8px;background:#8b5cf615;border:1px solid #8b5cf630;border-radius:6px;font-size:11px;color:#a78bfa;line-height:1.6">
      ⚠️ 此处配置仅保存插件设置，不会导入账号。保存后请点击上方「🚀 一键导入」按钮。
    </div>
    <div class="setting-item">
      <label>平台地址（Seedance Web 地址）</label>
      <input type="text" id="setting-platform-url" class="input-field" placeholder="http://localhost:5173" />
    </div>
    <div class="setting-item">
      <label>认证 Session ID（Seedance 平台登录后的 Session）</label>
      <input type="text" id="setting-auth-token" class="input-field" placeholder="在 Seedance 页面 F12 → Application → localStorage → seedance_session_id" />
    </div>
    <div class="setting-item">
      <label>默认代理地址（国际版账号，可选）</label>
      <input type="text" id="setting-proxy-url" class="input-field" placeholder="socks5://user:pass@host:port" />
    </div>
    <div class="setting-actions">
      <button id="btn-save-settings" class="btn btn-success btn-full">💾 保存设置</button>
    </div>
    <div id="settings-save-hint" class="result-msg result-success hidden" style="margin-top:8px">
      ✅ 设置已保存！请关闭此面板，然后点击上方账号区域的「🚀 一键导入」按钮将账号导入到平台。
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
